naftiko: "1.0.0-alpha1"

info:
  label: Amazon Private CA API
  description: Managed private certificate authority API for creating CA hierarchies, issuing X.509 certificates, and managing PKI infrastructure.
  tags:
    - Amazon
    - AWS
    - Certificate Authority
    - PKI
    - Security
    - X.509
    - Certificates
  created: "2026-04-19"
  modified: "2026-04-19"

binds:
  - namespace: env
    keys:
      AWS_ACCESS_KEY_ID: AWS_ACCESS_KEY_ID
      AWS_SECRET_ACCESS_KEY: AWS_SECRET_ACCESS_KEY
      AWS_REGION: AWS_REGION

capability:
  consumes:
    - type: http
      namespace: amazon-private-ca
      baseUri: https://acm-pca.{region}.amazonaws.com
      description: Amazon Private CA certificate management API
      authentication:
        type: apikey
        key: Authorization
        value: "{{AWS_ACCESS_KEY_ID}}"
        placement: header
      resources:
        - name: certificate-authorities
          path: /#X-Amz-Target=ACMPrivateCA.CreateCertificateAuthority
          description: Create and manage private certificate authorities
          operations:
            - name: create-certificate-authority
              method: POST
              description: Create a new private certificate authority
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  CertificateAuthorityConfiguration: "{{tools.ca_config}}"
                  CertificateAuthorityType: "{{tools.ca_type}}"

            - name: list-certificate-authorities
              method: POST
              description: List all private certificate authorities
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: describe-certificate-authority
              method: POST
              description: Get details about a certificate authority
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  CertificateAuthorityArn: "{{tools.ca_arn}}"

        - name: certificates
          path: /#X-Amz-Target=ACMPrivateCA.IssueCertificate
          description: Issue and manage certificates
          operations:
            - name: issue-certificate
              method: POST
              description: Issue a certificate using a certificate authority
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  CertificateAuthorityArn: "{{tools.ca_arn}}"
                  Csr: "{{tools.csr}}"
                  SigningAlgorithm: "{{tools.algorithm}}"
                  Validity: "{{tools.validity}}"

            - name: get-certificate
              method: POST
              description: Get an issued certificate
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  CertificateAuthorityArn: "{{tools.ca_arn}}"
                  CertificateArn: "{{tools.cert_arn}}"

            - name: revoke-certificate
              method: POST
              description: Revoke an issued certificate
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  CertificateAuthorityArn: "{{tools.ca_arn}}"
                  CertificateSerial: "{{tools.serial}}"
                  RevocationReason: "{{tools.reason}}"

  exposes:
    - type: rest
      port: 8100
      namespace: amazon-private-ca-rest
      resources:
        - path: /v1/certificate-authorities
          name: certificate-authorities
          description: Certificate authority management
          operations:
            - method: POST
              name: create-ca
              description: Create a private certificate authority
              call: "amazon-private-ca.create-certificate-authority"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: GET
              name: list-cas
              description: List certificate authorities
              call: "amazon-private-ca.list-certificate-authorities"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/certificates
          name: certificates
          description: Certificate issuance and management
          operations:
            - method: POST
              name: issue-certificate
              description: Issue a certificate
              call: "amazon-private-ca.issue-certificate"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: amazon-private-ca-mcp
      transport: http
      tools:
        - name: create-certificate-authority
          description: Create a new private certificate authority
          hints:
            readOnly: false
            destructive: false
          call: "amazon-private-ca.create-certificate-authority"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-certificate-authorities
          description: List all private certificate authorities in the account
          hints:
            readOnly: true
            openWorld: true
          call: "amazon-private-ca.list-certificate-authorities"
          outputParameters:
            - type: object
              mapping: "$."

        - name: describe-certificate-authority
          description: Get details about a specific certificate authority
          hints:
            readOnly: true
            openWorld: false
          call: "amazon-private-ca.describe-certificate-authority"
          with:
            ca_arn: "tools.ca_arn"
          outputParameters:
            - type: object
              mapping: "$."

        - name: issue-certificate
          description: Issue a new X.509 certificate from a certificate authority
          hints:
            readOnly: false
            destructive: false
          call: "amazon-private-ca.issue-certificate"
          with:
            ca_arn: "tools.ca_arn"
            csr: "tools.csr"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-certificate
          description: Retrieve an issued certificate
          hints:
            readOnly: true
            openWorld: false
          call: "amazon-private-ca.get-certificate"
          with:
            ca_arn: "tools.ca_arn"
            cert_arn: "tools.cert_arn"
          outputParameters:
            - type: object
              mapping: "$."

        - name: revoke-certificate
          description: Revoke an issued certificate
          hints:
            readOnly: false
            destructive: true
          call: "amazon-private-ca.revoke-certificate"
          with:
            ca_arn: "tools.ca_arn"
            serial: "tools.serial"
          outputParameters:
            - type: object
              mapping: "$."
