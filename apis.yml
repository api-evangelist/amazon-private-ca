aid: amazon-private-ca
name: Amazon Private CA
description: >-
  AWS Private Certificate Authority (AWS Private CA) is a highly available,
  fully managed private CA service that helps you easily and securely manage
  the lifecycle of your private certificates. It allows you to create private
  CA hierarchies and issue X.509 certificates for your internal resources.
