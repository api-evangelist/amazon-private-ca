modified: '2026-04-19'
apis:
- name: AWS Private CA API
  description: The AWS Private CA API provides programmatic access to create and manage private certificate authorities, issue X.509 certificates, manage certificate revocation lists, configure audit 
    reports, and control permissions and policies for private PKI infrastructure.
  humanURL: https://aws.amazon.com/private-ca/
  baseURL: https://acm-pca.amazonaws.com
  tags:
  - Certificates
  - PKI
  - Security
  - Certificate Authority
  - X.509
